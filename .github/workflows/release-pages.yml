name: Release and Deploy Pages

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optionales Release-Tag, z. B. v1.0.1"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run automated tests
        run: npm run test:all

      - name: Build production bundle
        run: npm run build

      - name: Package release assets
        run: |
          mkdir -p release
          cp dist/index.html release/foosboard.html
          cd dist
          zip -r ../release/foosboard-release.zip .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-build
          path: release/*

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name ==
      'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: release-build
          path: ./release

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag when started manually
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" ./release/foosboard-release.zip ./release/foosboard.html --clobber
          else
            gh release create "$TAG" ./release/foosboard-release.zip ./release/foosboard.html \
              --title "Foosboard $TAG" \
              --notes "Automatisch erzeugter Build für $TAG."
          fi

  deploy-pages:
    needs: build
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
      || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
